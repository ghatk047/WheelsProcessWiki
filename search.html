<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">
<title>Search — Wheels Process Wiki</title>
<link rel="stylesheet" href="assets/css/wiki.css">
</head>
<body>
<div class="wiki-topbar">
  <a class="topbar-logo" href="index.html">
    <svg viewBox="0 0 28 28" fill="none">
      <circle cx="14" cy="14" r="12" stroke="white" stroke-width="2"/>
      <circle cx="14" cy="14" r="5" fill="white"/>
      <line x1="14" y1="2"  x2="14" y2="6"  stroke="white" stroke-width="2"/>
      <line x1="14" y1="22" x2="14" y2="26" stroke="white" stroke-width="2"/>
      <line x1="2"  y1="14" x2="6"  y2="14" stroke="white" stroke-width="2"/>
      <line x1="22" y1="14" x2="26" y2="14" stroke="white" stroke-width="2"/>
    </svg>
    <div>
      <div class="topbar-brand">Wheels Process Wiki</div>
      <div class="topbar-sub">SAP Consulting Reference</div>
    </div>
  </a>
  <div class="topbar-spacer"></div>
  <div class="search-wrap">
    <svg class="search-icon" viewBox="0 0 16 16" fill="none">
      <circle cx="6.5" cy="6.5" r="4.5" stroke="white" stroke-width="1.5"/>
      <path d="M10 10l3 3" stroke="white" stroke-width="1.5" stroke-linecap="round"/>
    </svg>
    <input type="text" id="searchBox" placeholder="Search processes… (/)">
  </div>
</div>
<div class="wiki-layout">
  <aside class="wiki-sidebar" id="sidebar"></aside>
  <button class="sidebar-toggle" id="sidebarToggle">◀</button>
  <main class="wiki-main">
    <h2 style="font-size:18px;margin-bottom:4px">Search results for <span id="search-query"></span></h2>
    <div class="search-results" id="search-results">
      <p style="color:#64748b">Searching…</p>
    </div>
  </main>
</div>
<div id="lightbox">
  <div class="lb-controls">
    <button class="lb-btn" id="lbZoomIn">+</button>
    <button class="lb-btn" id="lbZoomOut">−</button>
    <button class="lb-btn" id="lbReset">↺</button>
    <span id="lbScale">100%</span>
    <button class="lb-btn" id="lbClose">✕</button>
  </div>
  <img id="lightboxImg" src="" alt="">
</div>
<script src="assets/js/wiki.js"></script>
</body>
</html>
